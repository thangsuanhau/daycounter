<!DOCTYPE html>
<html>
<head>
    <title>Day Counter</title>
    <style>
        .container { display: flex; }
        .form-section { flex: 1; }
        .history-section { flex: 1; margin-left: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>📅 Day Counter</h1>
    <div class="container">
        <div class="form-section">
            <form method="POST">
                <label>Start Date (YYYY-MM-DD):</label>
                <input type="text" name="start_date" required><br><br>

                <label>End Date (optional):</label>
                <input type="text" name="end_date"><br><br>

                <button type="submit">Calculate</button>
            </form>

            {% if result %}
                <h2>Result:</h2>
                <div id="result-box">
                    <p>{{ result }}</p>
                    <button type="button" onclick="document.getElementById('result-box').innerHTML=''">Clear Result</button>
                </div>
            {% endif %}
        </div>

        <div class="history-section">
    	<h2>Recent Results</h2>
    		<form method="POST" action="/clear_history" onsubmit="return confirm('Are you sure you want to clear all history? This action cannot be undone.')">
    		<button type="submit">Clear History</button>
		</form>
    	<table>
        	<tr>
            	<th>Start Date</th>
            	<th>End Date</th>
            	<th>Days</th>
            	<th>Timestamp</th>
        	</tr>
        	{% for row in history %}
        	<tr>
            	<td>{{ row[0] }}</td>
            	<td>{{ row[1] }}</td>
            	<td>{{ row[2] }}</td>
            	<td>{{ row[3] }}</td>
        	</tr>
        	{% endfor %}
    	</table>
	</div>
    </div>
</body>
</html>
